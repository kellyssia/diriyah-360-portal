<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      .brand { stroke:#B86F4F; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .brandFill { fill:#B86F4F; }
      .txt { fill:#B86F4F; font-family: Arial, Helvetica, sans-serif; font-weight:700; letter-spacing:1px; }
      .arabic { fill:#B86F4F; font-family: Arial, Tahoma, sans-serif; font-weight:700; }
    </style>
    <path id="topArc" d="M 260 315 A 430 430 0 0 1 940 315" />
    <path id="bottomArc" d="M 260 885 A 430 430 0 0 0 940 885" />
    <clipPath id="innerClip"><circle cx="600" cy="600" r="350"/></clipPath>
  </defs>

  <rect width="1200" height="1200" fill="#ffffff"/>

  <!-- outer seal rings -->
  <circle cx="600" cy="600" r="570" class="brand" stroke-width="12"/>
  <circle cx="600" cy="600" r="545" class="brand" stroke-width="5"/>
  <circle cx="600" cy="600" r="397" class="brand" stroke-width="10"/>
  <circle cx="600" cy="600" r="374" class="brand" stroke-width="5"/>

  <!-- curved editable text -->
  <text class="arabic" font-size="86" direction="rtl" unicode-bidi="bidi-override">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">شركة الدرعية</textPath>
  </text>
  <text class="txt" font-size="76">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">Diriyah Company</textPath>
  </text>

  <!-- side triangular motifs -->
  <g class="brand" stroke-width="7">
    <g transform="translate(178 600)">
      <polygon points="-65,-355 5,-310 -55,-285"/>
      <polygon points="-90,-245 -15,-220 -80,-175"/>
      <polygon points="-98,-125 -20,-112 -88,-56"/>
      <polygon points="-100,0 -22,0 -90,60"/>
      <polygon points="-88,118 -18,95 -64,175"/>
      <polygon points="-54,225 13,185 -20,275"/>
      <polygon points="6,320 65,260 54,355"/>
    </g>
    <g transform="translate(1022 600) scale(-1 1)">
      <polygon points="-65,-355 5,-310 -55,-285"/>
      <polygon points="-90,-245 -15,-220 -80,-175"/>
      <polygon points="-98,-125 -20,-112 -88,-56"/>
      <polygon points="-100,0 -22,0 -90,60"/>
      <polygon points="-88,118 -18,95 -64,175"/>
      <polygon points="-54,225 13,185 -20,275"/>
      <polygon points="6,320 65,260 54,355"/>
    </g>
  </g>

  <!-- central landscape -->
  <g clip-path="url(#innerClip)">
    <g class="brand" stroke-width="14">
      <path d="M247 693 L292 545 Q305 508 350 508 L469 508 Q501 508 523 486 L555 452 Q580 425 614 453 L670 508 Q690 528 721 528 L778 528 Q811 528 826 556 L883 693 Z"/>
      <path d="M495 693 L520 490 Q527 434 572 432 L614 504 Q631 528 670 528"/>
      <path d="M365 509 L390 429 Q402 393 443 393 L473 393 Q494 393 503 374 L520 325 Q527 306 548 306 L583 306 Q604 306 612 284 L618 264 Q622 247 642 247 L674 247 Q697 247 702 269 L731 440"/>
      <path d="M482 392 Q517 392 530 364 Q544 334 575 329 Q603 324 618 294"/>
      <path d="M709 421 L772 421 Q807 421 815 455 L828 504"/>
      <path d="M827 504 L895 504 Q928 504 942 474 Q963 431 994 433 Q1020 436 1030 475 L1065 693"/>
    </g>
    <g class="brand" stroke-width="8">
      <line x1="250" y1="725" x2="950" y2="725"/>
      <line x1="270" y1="760" x2="930" y2="760"/>
      <line x1="300" y1="795" x2="900" y2="795"/>
      <line x1="335" y1="830" x2="865" y2="830"/>
      <line x1="375" y1="865" x2="825" y2="865"/>
      <line x1="430" y1="900" x2="770" y2="900"/>
